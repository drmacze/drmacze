<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOW PLAYING // FIRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <style>
    :root {
      --black:   #000000;
      --bg:      #060100;
      --surf:    #120400;
      --surf2:   #1e0700;
      --fy:      #FFD700;
      --fo:      #FF6600;
      --fr:      #CC2200;
      --fd:      #771100;
      --fe:      #3a0800;
      --text:    #FFF0CC;
      --muted:   #CC7733;
      --dead:    #3a1800;
      --px:      4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Fire background canvas ── */
    #glc {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      background: #060100;
      filter: blur(3px) brightness(1.15);
    }

    /* ── Scanlines ────────────────────────────────────────── */
    #scan {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none; z-index: 997;
    }

    /* ── Pixel grid bg overlay (now handled by #glc CSS) ─── */
    #pgrid { display: none; }

    /* ── Fire pixel bar (bottom) ──────────────────────────── */
    #firebar {
      position: fixed; bottom: 0; left: 0;
      width: 100%; z-index: 3;
      pointer-events: none; display: block;
      filter: blur(5px) brightness(1.35) saturate(1.4);
    }

    /* ── Screen corner brackets ───────────────────────────── */
    .scr-corner {
      position: fixed; z-index: 10;
      width: 28px; height: 28px;
    }
    .scr-corner::before,
    .scr-corner::after {
      content: ''; position: absolute;
      background: var(--fo);
    }
    .scr-corner::before { width: 100%; height: 3px; top: 0; left: 0; }
    .scr-corner::after  { width: 3px; height: 100%; top: 0; left: 0; }
    .scr-corner.tl { top: 12px; left: 12px; }
    .scr-corner.tr { top: 12px; right: 12px; transform: rotate(90deg); }
    .scr-corner.bl { bottom: 12px; left: 12px; transform: rotate(270deg); }
    .scr-corner.br { bottom: 12px; right: 12px; transform: rotate(180deg); }

    /* ── Layout ───────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 80px 24px 200px;
    }
    /* dark radial vignette behind card — keeps text readable over fire bg */
    .page::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(
        ellipse 70% 65% at 50% 42%,
        rgba(6,1,0,0.78) 0%,
        rgba(6,1,0,0.45) 50%,
        transparent 100%
      );
      pointer-events: none; z-index: -1;
    }

    /* ── Header ───────────────────────────────────────────── */
    .hdr { display: flex; flex-direction: column; align-items: center; gap: 14px; }

    .hdr-label {
      font-size: 6px; letter-spacing: 5px;
      color: var(--muted); text-transform: uppercase;
    }

    .hdr-title-wrap {
      display: flex; align-items: center; gap: 8px;
    }

    .hdr-title {
      font-size: 16px; letter-spacing: 2px;
      background: linear-gradient(180deg, var(--fy) 0%, var(--fo) 50%, var(--fr) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(255,102,0,0.6));
    }

    #cursor-blink {
      display: inline-block; width: 12px; height: 18px;
      background: var(--fo); flex-shrink: 0;
    }

    .hdr-divider {
      width: 320px; height: 3px;
      background: linear-gradient(90deg,
        transparent, var(--fy), var(--fo), var(--fr), transparent);
    }

    /* ── Main card ────────────────────────────────────────── */
    .card { width: 100%; max-width: 540px; position: relative; }

    .card-inner {
      background: var(--surf);
      border: 3px solid var(--fo);
      padding: 20px; position: relative;
      box-shadow:
        6px 6px 0 var(--fd),
        0 0 50px rgba(255,102,0,0.12),
        inset 0 0 50px rgba(0,0,0,0.6);
    }

    /* pixel corner squares */
    .pxc {
      position: absolute; width: 8px; height: 8px;
    }
    .pxc.tl { top: -3px; left: -3px; background: var(--fy); }
    .pxc.tr { top: -3px; right: -3px; background: var(--fy); }
    .pxc.bl { bottom: -3px; left: -3px; background: var(--fy); }
    .pxc.br { bottom: -3px; right: -3px; background: var(--fy); }

    /* ── Card title bar ───────────────────────────────────── */
    .card-titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; margin: -20px -20px 16px;
      background: var(--surf2);
      border-bottom: 2px solid var(--fo);
    }

    .card-tb-left { display: flex; align-items: center; gap: 8px; }

    /* fire LED dot cluster */
    .fire-leds { display: flex; gap: 3px; }
    .fire-led-dot {
      width: 8px; height: 8px;
      background: var(--dead);
      border: 1px solid var(--fd);
    }
    .fire-leds.on .fire-led-dot:nth-child(1) {
      background: var(--fy);
      box-shadow: 0 0 8px var(--fy);
    }
    .fire-leds.on .fire-led-dot:nth-child(2) {
      background: var(--fo);
      box-shadow: 0 0 6px var(--fo);
    }
    .fire-leds.on .fire-led-dot:nth-child(3) {
      background: var(--fr);
      box-shadow: 0 0 4px var(--fr);
    }

    .status-label {
      font-size: 7px; letter-spacing: 2px;
      color: var(--dead);
    }
    .status-label.on { color: var(--fo); }

    /* EQ bars */
    .eq-wrap { display: flex; align-items: flex-end; gap: 3px; height: 22px; }
    .eq-bar {
      width: 6px; background: var(--fo);
      image-rendering: pixelated;
    }

    /* ── Card body ────────────────────────────────────────── */
    .card-body { display: flex; gap: 20px; align-items: flex-start; }

    /* ── Album art ────────────────────────────────────────── */
    .art-wrap { flex-shrink: 0; position: relative; }

    .art-frame {
      width: 108px; height: 108px;
      background: var(--surf2);
      border: 3px solid var(--fr);
      position: relative; overflow: hidden;
    }
    /* pixel grid overlay */
    .art-frame::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,102,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,102,0,0.06) 1px, transparent 1px);
      background-size: 6px 6px;
      z-index: 2; pointer-events: none;
    }
    /* fire shimmer */
    .art-frame::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(255,200,0,0.08) 0%, transparent 60%);
      z-index: 3; pointer-events: none;
    }

    .art-frame img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      image-rendering: auto;
    }

    .art-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 6px;
    }

    .art-pxc { position: absolute; z-index: 4; }
    .art-pxc.tl { top: -3px; left: -3px;   width: 6px; height: 6px; background: var(--fy); }
    .art-pxc.tr { top: -3px; right: -3px;  width: 6px; height: 6px; background: var(--fy); }
    .art-pxc.bl { bottom: -3px; left: -3px;  width: 6px; height: 6px; background: var(--fy); }
    .art-pxc.br { bottom: -3px; right: -3px; width: 6px; height: 6px; background: var(--fy); }

    /* ── Track info ───────────────────────────────────────── */
    .info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    .track-title {
      font-size: 10px; line-height: 1.8;
      color: var(--text); word-break: break-word;
    }
    .track-artist {
      font-size: 8px; color: var(--muted);
      letter-spacing: 1px; line-height: 1.6;
    }

    /* pixel art divider line */
    .px-divider {
      height: 2px;
      background: linear-gradient(90deg, var(--fo), var(--fr), transparent);
      width: 70%;
    }

    /* pixel art button */
    .px-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; letter-spacing: 1px;
      color: var(--fo); text-decoration: none;
      background: var(--fe);
      border: 2px solid var(--fo);
      padding: 7px 10px;
      box-shadow: 3px 3px 0 var(--fd);
      cursor: pointer;
      transition: none;
      margin-top: 4px;
    }
    .px-btn:hover {
      background: var(--fr);
      color: var(--fy);
      border-color: var(--fy);
      box-shadow: 4px 4px 0 var(--fd);
      transform: translate(-1px, -1px);
    }
    .px-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--fd);
    }

    /* ── Progress section ─────────────────────────────────── */
    .prog-section {
      margin-top: 18px; padding-top: 14px;
      border-top: 2px solid var(--fe);
    }

    .prog-track { display: flex; gap: 2px; margin-bottom: 8px; }

    .prog-px { height: 9px; flex: 1; background: var(--surf2); }
    .prog-px.lit {
      background: var(--fy);
      box-shadow: 0 0 4px rgba(255,215,0,0.6);
    }
    .prog-px.lit-mid { background: var(--fo); }
    .prog-px.lit-end { background: var(--fr); }

    .time-row {
      display: flex; justify-content: space-between;
      font-size: 7px; color: var(--dead);
    }

    /* ── Embed section ────────────────────────────────────── */
    .embed-section {
      width: 100%; max-width: 540px;
      background: var(--surf);
      border: 2px solid var(--fe);
      padding: 16px 20px;
      box-shadow: 4px 4px 0 var(--fd);
    }
    .embed-lbl {
      font-size: 6px; letter-spacing: 3px;
      color: var(--dead); display: block; margin-bottom: 10px;
    }
    .embed-code {
      background: var(--black);
      border: 1px solid var(--fe);
      padding: 10px 12px;
      font-size: 8px; color: var(--fo);
      font-family: 'Courier New', monospace;
      word-break: break-all; cursor: pointer;
      display: block;
      transition: border-color 0.15s;
    }
    .embed-code:hover { border-color: var(--fo); }
    .embed-hint { font-size: 6px; color: var(--dead); margin-top: 6px; text-align: right; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer { font-size: 6px; color: var(--dead); letter-spacing: 3px; }


    /* ── Pixel art "not connected" message ────────────────── */
    .not-cfg {
      width: 100%; max-width: 540px;
      background: var(--surf);
      border: 2px solid var(--fd);
      padding: 24px; text-align: center;
      box-shadow: 4px 4px 0 #330500;
      display: none;
    }
    .not-cfg h3 { font-size: 9px; color: var(--fo); margin-bottom: 12px; letter-spacing: 2px; }
    .not-cfg p  { font-size: 7px; color: var(--muted); line-height: 2.2; }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// LENIS SMOOTH SCROLL
// ═══════════════════════════════════════════════════════════════
const lenis = new Lenis({
  duration: 1.2,
  easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
});
(function raf(t) { lenis.raf(t); requestAnimationFrame(raf); })(0);


// ═══════════════════════════════════════════════════════════════
// REALISTIC FIRE BACKGROUND — small cells + glow bloom
// ═══════════════════════════════════════════════════════════════
(function initFireBG() {
  const cvs = document.getElementById('glc');
  const ctx = cvs.getContext('2d');
  if (!ctx) { cvs.style.display = 'none'; return; }

  /* palette: idx 0=black(cold) → 14=white-yellow(hottest) */
  const PAL = [
    '#060100','#130200','#2a0400','#440600',
    '#660900','#991100','#bb1900','#dd2200',
    '#ff3300','#ff5500','#ff7700','#ff9900',
    '#ffbb00','#ffd700','#ffee80'
  ];
  const NPAL = PAL.length;
  const CELL = 4;

  const getW = () => Math.max(window.innerWidth  || 320, screen.width  || 320);
  const getH = () => Math.max(window.innerHeight || 240, screen.height || 240);

  let COLS, ROWS, grid, nxtGrid;

  const init = () => {
    const W = getW(), H = getH();
    cvs.width  = W;
    cvs.height = H;
    COLS = Math.ceil(W / CELL) + 2;
    ROWS = Math.ceil(H / CELL) + 4;
    grid    = new Uint8Array(COLS * ROWS);
    nxtGrid = new Uint8Array(COLS * ROWS);
    /* seed: bottom 3 rows full heat */
    for (let c = 0; c < COLS; c++) {
      grid[(ROWS - 1) * COLS + c] = NPAL - 1;
      grid[(ROWS - 2) * COLS + c] = NPAL - 1;
      grid[(ROWS - 3) * COLS + c] = NPAL - 2;
    }
  };

  /* turbulent Doom fire — wind ±2, variable decay */
  const spread = () => {
    nxtGrid.set(grid);   /* start from current state */
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS; c++) {
        const below = grid[(r + 1) * COLS + c];
        const wind  = (Math.random() * 5 | 0) - 2;   /* -2 to +2 */
        const decay = Math.random() < 0.45 ? 1 : 0;
        const nc    = Math.max(0, Math.min(COLS - 1, c + wind));
        nxtGrid[r * COLS + nc] = Math.max(0, below - decay);
      }
    }
    /* re-seed bottom rows with slight noise so fire never goes out */
    for (let c = 0; c < COLS; c++) {
      const heat = Math.random() < 0.96 ? NPAL - 1 : NPAL - 3;
      nxtGrid[(ROWS - 1) * COLS + c] = heat;
      nxtGrid[(ROWS - 2) * COLS + c] = heat;
    }
    const tmp = grid; grid = nxtGrid; nxtGrid = tmp;
  };

  const draw = () => {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    const visRows = ROWS - 3;
    for (let r = 0; r < visRows; r++) {
      const y  = r * CELL;
      const yF = r / visRows;
      /* fade top 40% of screen so card stays readable */
      const opa = yF < 0.4
        ? yF / 0.4 * 0.55
        : 0.55 + (yF - 0.4) / 0.6 * 0.45;
      for (let c = 0; c < COLS; c++) {
        const t = grid[r * COLS + c];
        if (t === 0) continue;
        ctx.globalAlpha = opa;
        /* glow bloom — hot cells glow more */
        ctx.shadowBlur  = t > 9 ? 14 : t > 5 ? 8 : 3;
        ctx.shadowColor = PAL[Math.min(t + 2, NPAL - 1)];
        ctx.fillStyle   = PAL[t];
        ctx.fillRect(c * CELL, y, CELL, CELL);
      }
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
  };

  init();
  for (let i = 0; i < 80; i++) spread();
  draw();

  window.addEventListener('resize', init);

  (function loop() {
    spread();
    draw();
    requestAnimationFrame(loop);
  })();
})();


// ═══════════════════════════════════════════════════════════════
// REALISTIC FIRE BAR (bottom) — 2D Doom propagation + glow
// ═══════════════════════════════════════════════════════════════
(function initFireBar() {
  const cvs = document.getElementById('firebar');
  const ctx = cvs.getContext('2d');

  /* palette: cold(0) → hot(14) */
  const PAL = [
    '#060100','#130200','#2a0400','#440600',
    '#660900','#991100','#bb1900','#dd2200',
    '#ff3300','#ff5500','#ff7700','#ff9900',
    '#ffbb00','#ffd700','#ffee80'
  ];
  const NPAL = PAL.length;
  const CELL = 4;
  const ROWS = 40;   /* ~160px tall */

  let COLS, grid, nxtGrid;
  let playing = false;

  const getW = () => Math.max(window.innerWidth || 320, screen.width || 320);

  const init = () => {
    const W = getW();
    COLS = Math.ceil(W / CELL) + 2;
    cvs.width  = W;
    cvs.height = ROWS * CELL;
    grid    = new Uint8Array(COLS * ROWS);
    nxtGrid = new Uint8Array(COLS * ROWS);
    seedBottom();
  };

  const seedBottom = () => {
    for (let c = 0; c < COLS; c++) {
      grid[(ROWS - 1) * COLS + c] = NPAL - 1;
      grid[(ROWS - 2) * COLS + c] = NPAL - 1;
      grid[(ROWS - 3) * COLS + c] = NPAL - 2;
    }
  };

  const spread = () => {
    nxtGrid.set(grid);   /* start from current state */
    const intensity = playing ? 0.38 : 0.52;  /* lower = more intense */
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS; c++) {
        const below = grid[(r + 1) * COLS + c];
        const wind  = (Math.random() * 5 | 0) - 2;
        const decay = Math.random() < intensity ? 1 : 0;
        const nc    = Math.max(0, Math.min(COLS - 1, c + wind));
        nxtGrid[r * COLS + nc] = Math.max(0, below - decay);
      }
    }
    /* re-seed bottom: playing = full heat, idle = slight gaps */
    for (let c = 0; c < COLS; c++) {
      const hot = playing
        ? Math.random() < 0.98 ? NPAL - 1 : NPAL - 2
        : Math.random() < 0.80 ? NPAL - 1 : Math.floor(Math.random() * 4);
      nxtGrid[(ROWS - 1) * COLS + c] = hot;
      nxtGrid[(ROWS - 2) * COLS + c] = hot;
    }
    const tmp = grid; grid = nxtGrid; nxtGrid = tmp;
  };

  const draw = () => {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    for (let r = 0; r < ROWS; r++) {
      const y = r * CELL;
      for (let c = 0; c < COLS; c++) {
        const t = grid[r * COLS + c];
        if (t === 0) continue;
        /* bloom glow — brightest on hottest cells */
        ctx.shadowBlur  = t > 10 ? 18 : t > 6 ? 10 : 4;
        ctx.shadowColor = PAL[Math.min(t + 3, NPAL - 1)];
        ctx.fillStyle   = PAL[t];
        ctx.fillRect(c * CELL, y, CELL, CELL);
      }
    }
    ctx.shadowBlur = 0;
  };

  init();
  for (let i = 0; i < 60; i++) spread();

  window.addEventListener('resize', init);
  window.addEventListener('load', init);

  (function loop() { spread(); draw(); requestAnimationFrame(loop); })();

  window.setFirePlaying = v => { playing = v; };
})();


// ═══════════════════════════════════════════════════════════════
// GSAP ANIMATIONS
// ═══════════════════════════════════════════════════════════════
gsap.registerPlugin(TextPlugin);

gsap.timeline({ delay: 0.2 })
  .from('#hdr',      { opacity: 0, y: -28, duration: 0.55, ease: 'power3.out' })
  .from('#hdr-div',  { scaleX: 0, duration: 0.4, ease: 'power2.out' }, '-=0.15')
  .from('#main-card',{ opacity: 0, y: 28, duration: 0.55, ease: 'power3.out' }, '-=0.2')
  .from('.footer',   { opacity: 0, duration: 0.4 });

// cursor blink
gsap.to('#cursor-blink', { opacity: 0, duration: 0.55, repeat: -1, yoyo: true, ease: 'steps(1)' });


// ═══════════════════════════════════════════════════════════════
// EQUALIZER BARS
// ═══════════════════════════════════════════════════════════════
let eqTls  = [];
const EQ_IDS = ['b1','b2','b3','b4','b5','b6','b7','b8'];
const EQ_SEQ = [
  [3,16,7,20,9,14,3], [9,3,18,5,14,3,10],
  [14,20,5,16,3,18,8],[5,10,22,3,14,6,16],
  [20,5,14,3,18,6,20],[6,18,3,12,20,3,14],
  [11,3,16,6,12,3,11],[16,8,3,20,6,12,16],
];
// fire gradient colors for each bar (yellow→orange→red)
const EQ_COLORS = ['#FFD700','#FFC200','#FFA500','#FF7700','#FF4400','#FF2200','#CC1100','#AA0F00'];

function startEQ() {
  stopEQ();
  EQ_IDS.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.background = EQ_COLORS[i];
    const seq = EQ_SEQ[i];
    const tl  = gsap.timeline({ repeat: -1 });
    seq.forEach(h => tl.to(el, { height: h, duration: 0.08 + Math.random() * 0.05, ease: 'none' }));
    tl.timeScale(0.7 + Math.random() * 0.45);
    eqTls.push(tl);
  });
}
function stopEQ() {
  eqTls.forEach(t => t.kill()); eqTls = [];
  EQ_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.background = 'var(--fe)'; gsap.to(el, { height: 3, duration: 0.35 }); }
  });
}


// ═══════════════════════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════════════════════
const BLOCKS = 42;
const progTrack = document.getElementById('prog-track');

(function initProg() {
  for (let i = 0; i < BLOCKS; i++) {
    const b = document.createElement('div');
    b.className = 'prog-px'; b.id = 'pp' + i;
    progTrack.appendChild(b);
  }
})();

function setProg(pct) {
  const filled = Math.round(pct * BLOCKS);
  for (let i = 0; i < BLOCKS; i++) {
    const el = document.getElementById('pp' + i);
    if (!el) continue;
    el.classList.remove('lit','lit-mid','lit-end');
    if (i < filled) {
      const ratio = i / BLOCKS;
      if (ratio < 0.4) el.classList.add('lit');
      else if (ratio < 0.75) el.classList.add('lit-mid');
      else el.classList.add('lit-end');
    }
  }
}

function fmt(ms) {
  const s = Math.floor((ms || 0) / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}


// ═══════════════════════════════════════════════════════════════
// MUSIC STATE
// ═══════════════════════════════════════════════════════════════
let _progress = 0, _duration = 0, _playing = false, _ticker = null;

function startTick() {
  stopTick();
  _ticker = setInterval(() => {
    if (_playing && _duration > 0) {
      _progress = Math.min(_progress + 1000, _duration);
      setProg(_progress / _duration);
      document.getElementById('t-cur').textContent = fmt(_progress);
    }
  }, 1000);
}
function stopTick() { clearInterval(_ticker); _ticker = null; }

function applyTrack(data) {
  _playing  = !!data.isPlaying;
  _progress = data.progress || 0;
  _duration = data.duration || 0;

  /* status */
  const leds = document.getElementById('fire-leds');
  const lbl  = document.getElementById('slabel');
  leds.classList.toggle('on', _playing);
  lbl.classList.toggle('on', _playing || data.isTopTrack);
  lbl.textContent = _playing ? 'NOW PLAYING' :
    data.isTopTrack ? 'LAST PLAYED' : 'NOTHING PLAYING';

  /* fire + eq */
  if (window.setFirePlaying) window.setFirePlaying(_playing || !!data.isTopTrack);
  if (_playing || data.isTopTrack) startEQ(); else stopEQ();

  /* album art */
  const aImg = document.getElementById('art-img');
  const aPh  = document.getElementById('art-ph');
  if (data.albumArt) {
    aImg.src = data.albumArt; aImg.style.display = 'block';
    aPh.style.display = 'none';
  } else {
    aImg.style.display = 'none'; aPh.style.display = 'flex';
  }

  /* track info */
  document.getElementById('s-title').textContent  = (data.title  || '---').substring(0, 22);
  document.getElementById('s-artist').textContent = (data.artist || '---').substring(0, 28);

  const lnk = document.getElementById('s-link');
  if (data.songUrl) { lnk.href = data.songUrl; lnk.style.display = 'inline-flex'; }
  else { lnk.style.display = 'none'; }

  /* progress */
  setProg(_duration > 0 ? _progress / _duration : 0);
  document.getElementById('t-cur').textContent = fmt(_progress);
  document.getElementById('t-dur').textContent = fmt(_duration);

  if (_playing) startTick(); else stopTick();

  /* card glow */
  gsap.to('.card-inner', {
    boxShadow: _playing
      ? '6px 6px 0 var(--fd), 0 0 60px rgba(255,102,0,0.3), inset 0 0 50px rgba(0,0,0,0.6)'
      : '6px 6px 0 var(--fd), 0 0 50px rgba(255,102,0,0.08), inset 0 0 50px rgba(0,0,0,0.6)',
    duration: 1.0,
  });

  /* embed */
  const embSec  = document.getElementById('embed-sec');
  const embCode = document.getElementById('embed-code');
  if (embSec && embCode) {
    embSec.style.display = 'block';
    const url = window.location.origin;
    embCode.textContent = `[![Now Playing](${url}/api/now-playing/svg)](${url})`;
  }

  /* hide not-cfg if data received */
  document.getElementById('not-cfg').style.display = 'none';
  document.getElementById('main-card').style.display = 'block';
}

function handleError(data) {
  if (data.error === 'not_configured') {
    document.getElementById('not-cfg').style.display = 'block';
    document.getElementById('main-card').style.display = 'none';
  }
}


// ═══════════════════════════════════════════════════════════════
// SSE — live music stream
// ═══════════════════════════════════════════════════════════════
const es = new EventSource('/api/stream');
es.onmessage = e => {
  try {
    const d = JSON.parse(e.data);
    if (d.error) handleError(d);
    else applyTrack(d);
  } catch {}
};


// ═══════════════════════════════════════════════════════════════
// EMBED COPY
// ═══════════════════════════════════════════════════════════════
function copyEmbed(el) {
  navigator.clipboard?.writeText(el.textContent).then(() => {
    const orig = el.textContent;
    el.textContent = '[ COPIED! ]';
    setTimeout(() => el.textContent = orig, 1500);
  });
}
