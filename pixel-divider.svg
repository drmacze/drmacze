<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%">
  <rect width="800" height="20" fill="#0d1117"/>
  <rect x="0" y="9" width="800" height="2" fill="#161b22"/>
  <rect x="0" y="9" width="16" height="2" fill="#22c55e">
    <animate attributeName="width" values="16;800;16" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="7" width="4" height="6" fill="#22c55e" opacity="0.6"/>
  <rect x="796" y="7" width="4" height="6" fill="#22c55e" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>
</svg>