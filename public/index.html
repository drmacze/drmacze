<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOW PLAYING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <style>
    :root {
      --pink:       #e91e8c;
      --pink-light: #f472b6;
      --pink-dim:   #e91e8c33;
      --pink-glow:  #e91e8c22;
      --purple:     #9c27b0;
      --purple-dim: #9c27b044;
      --rose:       #f8c8d4;
      --dark:       #0d0014;
      --surface:    #1a0a2e;
      --surface2:   #2d1b3d;
      --border:     #3d2a50;
      --text:       #f8e8ff;
      --muted:      #c084fc;
      --dead:       #4a3560;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      image-rendering: pixelated;
    }

    /* ── Large pixel grid background (like beadwork) ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--surface) 1px, transparent 1px),
        linear-gradient(90deg, var(--surface) 1px, transparent 1px);
      background-size: 10px 10px;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Gradient vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 20% 20%, #e91e8c0a 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 80% 80%, #9c27b00a 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 998;
    }

    /* ── Pixel corner brackets ── */
    .corner {
      position: fixed;
      z-index: 10;
      width: 24px;
      height: 24px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--pink);
    }
    .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
    .corner::after  { width: 2px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 12px; left: 12px; }
    .corner.tr { top: 12px; right: 12px; transform: rotate(90deg); }
    .corner.bl { bottom: 12px; left: 12px; transform: rotate(270deg); }
    .corner.br { bottom: 12px; right: 12px; transform: rotate(180deg); }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 60px 24px;
    }

    /* ── Header ── */
    .sys-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .sys-label {
      font-size: 7px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .sys-title {
      font-size: 16px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--pink), var(--pink-light), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 16px var(--pink-dim));
      position: relative;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 14px;
      background: var(--pink);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .sys-divider {
      height: 2px;
      width: 240px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--purple), transparent);
      transform-origin: center;
    }

    /* ── Main card ── */
    .card {
      width: 100%;
      max-width: 520px;
      position: relative;
    }

    /* Pixel-art clip corners */
    .card-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      position: relative;
      clip-path: polygon(
        0 10px, 10px 0,
        calc(100% - 10px) 0, 100% 10px,
        100% calc(100% - 10px), calc(100% - 10px) 100%,
        10px 100%, 0 calc(100% - 10px)
      );
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .card.playing .card-inner {
      border-color: var(--pink-dim);
      box-shadow:
        0 0 40px -10px var(--pink-dim),
        inset 0 0 40px -20px var(--pink-glow);
    }

    /* Pixel corner squares */
    .px-corner {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--pink);
      z-index: 2;
    }
    .px-corner.tl { top: -1px; left: -1px; }
    .px-corner.tr { top: -1px; right: -1px; }
    .px-corner.bl { bottom: -1px; left: -1px; }
    .px-corner.br { bottom: -1px; right: -1px; }

    /* ── Card top ── */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Pixel-art LED indicator (4×4 grid of squares) */
    .led {
      display: grid;
      grid-template-columns: repeat(2, 4px);
      gap: 1px;
    }
    .led-cell {
      width: 4px;
      height: 4px;
      background: var(--dead);
    }
    .led.on .led-cell {
      background: var(--pink);
      box-shadow: 0 0 4px var(--pink);
      animation: led-pulse 1s ease-in-out infinite alternate;
    }
    @keyframes led-pulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .status-label {
      font-size: 7px;
      letter-spacing: 2px;
      color: var(--dead);
    }
    .status-label.on { color: var(--pink); }

    /* Pixel equalizer blocks (right side) */
    .eq-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }

    .eq-bar {
      width: 5px;
      background: var(--pink);
      image-rendering: pixelated;
      box-shadow: 0 0 4px var(--pink-dim);
    }

    /* ── Art + info ── */
    .card-body {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .art-wrap { position: relative; flex-shrink: 0; }

    .art-frame {
      width: 100px;
      height: 100px;
      border: 2px solid var(--pink-dim);
      position: relative;
      overflow: hidden;
      background: var(--surface2);
      image-rendering: pixelated;
    }

    /* Pixel grid overlay on art */
    .art-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 5px 5px;
      z-index: 2;
      pointer-events: none;
    }

    .art-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      display: block;
    }

    .art-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .art-corner {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--pink);
      z-index: 3;
    }
    .art-corner.tl { top: -1px; left: -1px; }
    .art-corner.tr { top: -1px; right: -1px; }
    .art-corner.bl { bottom: -1px; left: -1px; }
    .art-corner.br { bottom: -1px; right: -1px; }

    /* Pink gradient shimmer on art */
    .art-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--pink-glow) 0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    .info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }

    .song-title {
      font-size: 10px;
      line-height: 1.8;
      letter-spacing: 0.5px;
      word-break: break-word;
      color: var(--text);
    }

    .song-artist {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 7px;
      color: var(--pink);
      text-decoration: none;
      letter-spacing: 1px;
      border: 1px solid var(--pink-dim);
      padding: 6px 10px;
      margin-top: 6px;
      clip-path: polygon(0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px));
      transition: background 0.15s;
    }
    .open-link:hover { background: var(--pink-glow); }
    .open-link svg { width: 10px; height: 10px; fill: currentColor; }

    /* ── Progress ── */
    .progress-section { margin-top: 20px; }

    .prog-track {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
    }

    .prog-px {
      height: 8px;
      flex: 1;
      background: var(--surface2);
      position: relative;
      clip-path: none;
    }

    .prog-px.filled {
      background: var(--pink);
      box-shadow: 0 0 4px var(--pink-dim);
    }

    .prog-px.half {
      background: linear-gradient(90deg, var(--pink) 50%, var(--surface2) 50%);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 7px;
      color: var(--dead);
      letter-spacing: 1px;
    }

    /* ── Auth box ── */
    .auth-box {
      display: none;
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid #f0883e55;
      padding: 28px;
      text-align: center;
      clip-path: polygon(
        0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px,
        100% calc(100% - 10px), calc(100% - 10px) 100%,
        10px 100%, 0 calc(100% - 10px)
      );
    }

    .auth-box h3 { font-size: 10px; color: #f0883e; margin-bottom: 12px; letter-spacing: 2px; }
    .auth-box p  { font-size: 7px; color: var(--muted); line-height: 2; margin-bottom: 20px; }

    .btn-auth {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      text-decoration: none;
      letter-spacing: 1px;
      clip-path: polygon(0 4px, 4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px));
    }

    /* ── Embed section ── */
    .embed-section {
      display: none;
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
    }

    .embed-label { font-size: 7px; letter-spacing: 3px; color: var(--dead); margin-bottom: 10px; display: block; }

    .embed-code {
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 9px;
      color: var(--pink);
      font-family: 'Courier New', monospace;
      word-break: break-all;
      cursor: pointer;
      transition: border-color 0.2s;
      display: block;
    }
    .embed-code:hover { border-color: var(--pink); }
    .embed-hint { font-size: 7px; color: var(--dead); margin-top: 6px; text-align: right; }

    /* ── Particle canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Footer ── */
    .footer { font-size: 7px; color: var(--dead); letter-spacing: 2px; }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>
  <div class="scanlines"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="page">

    <div class="sys-header" id="header">
      <div class="sys-label">AUDIO MODULE // SYSTEM V2.0</div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="sys-title">NOW_PLAYING</div>
        <div class="cursor"></div>
      </div>
      <div class="sys-divider" id="divider"></div>
    </div>

    <div class="card" id="card">
      <div class="px-corner tl"></div>
      <div class="px-corner tr"></div>
      <div class="px-corner bl"></div>
      <div class="px-corner br"></div>
      <div class="card-inner">

        <div class="card-top">
          <div class="status-row">
            <div class="led" id="led">
              <div class="led-cell"></div>
              <div class="led-cell"></div>
              <div class="led-cell"></div>
              <div class="led-cell"></div>
            </div>
            <div class="status-label" id="slabel">LOADING</div>
          </div>
          <div class="eq-wrap" id="eq-wrap">
            <div class="eq-bar" id="b1" style="height:3px"></div>
            <div class="eq-bar" id="b2" style="height:8px"></div>
            <div class="eq-bar" id="b3" style="height:5px"></div>
            <div class="eq-bar" id="b4" style="height:12px"></div>
            <div class="eq-bar" id="b5" style="height:4px"></div>
            <div class="eq-bar" id="b6" style="height:15px"></div>
            <div class="eq-bar" id="b7" style="height:6px"></div>
            <div class="eq-bar" id="b8" style="height:9px"></div>
          </div>
        </div>

        <div class="card-body">
          <div class="art-wrap">
            <div class="art-frame" id="art-frame">
              <div class="art-placeholder" id="art-ph">
                <!-- Pixel note icon -->
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="13" y="3" width="3" height="18" fill="#e91e8c" opacity="0.5"/>
                  <rect x="16" y="3" width="10" height="3" fill="#e91e8c" opacity="0.5"/>
                  <rect x="23" y="3" width="3" height="8" fill="#e91e8c" opacity="0.5"/>
                  <rect x="8" y="19" width="8" height="5" fill="#e91e8c" opacity="0.6"/>
                  <rect x="18" y="19" width="8" height="5" fill="#e91e8c" opacity="0.6"/>
                  <rect x="5" y="21" width="6" height="5" fill="#e91e8c" opacity="0.7"/>
                  <rect x="15" y="21" width="6" height="5" fill="#e91e8c" opacity="0.7"/>
                </svg>
              </div>
              <img id="art-img" style="display:none" alt=""/>
              <div class="art-shimmer"></div>
            </div>
            <div class="art-corner tl"></div>
            <div class="art-corner tr"></div>
            <div class="art-corner bl"></div>
            <div class="art-corner br"></div>
          </div>

          <div class="info">
            <div class="song-title" id="s-title">---</div>
            <div class="song-artist" id="s-artist">---</div>
            <a class="open-link" id="s-link" href="#" target="_blank" style="display:none">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.624.624 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.624.624 0 0 1-.277-1.216c3.809-.87 7.076-.496 9.712 1.115a.624.624 0 0 1 .207.858zm1.223-2.723a.78.78 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.781.781 0 1 1-.454-1.491c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 0 1 .257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 1 1-.543-1.793c3.563-1.08 9.487-.871 13.22 1.37a.937.937 0 0 1-.96 1.578l-.1-.001z"/></svg>
              OPEN IN SPOTIFY
            </a>
          </div>
        </div>

        <div class="progress-section">
          <div class="prog-track" id="prog-track"></div>
          <div class="time-row">
            <span id="t-cur">0:00</span>
            <span id="t-dur">0:00</span>
          </div>
        </div>

      </div>
    </div>

    <div class="auth-box" id="auth-box">
      <h3>NOT CONNECTED</h3>
      <p>Connect your Spotify account<br/>to display now playing.</p>
      <a class="btn-auth" href="/auth">CONNECT SPOTIFY</a>
    </div>

    <div class="embed-section" id="embed-section">
      <span class="embed-label">README EMBED CODE</span>
      <div class="embed-code" id="embed-code" onclick="copyEmbed(this)"></div>
      <div class="embed-hint">CLICK TO COPY</div>
    </div>

    <div class="footer">DRMACZE // SPOTIFY MODULE // 2026</div>

  </div>

  <script>
    // ── Lenis ─────────────────────────────────────────────────────────────────
    const lenis = new Lenis({
      duration: 1.4,
      easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
    });
    (function raf(t) { lenis.raf(t); requestAnimationFrame(raf); })(0);

    // ── Pixel particle system ────────────────────────────────────────────────
    const cvs = document.getElementById('particles');
    const ctx = cvs.getContext('2d');
    let pts = [];

    function resizeCvs() { cvs.width = innerWidth; cvs.height = innerHeight; }
    resizeCvs();
    addEventListener('resize', resizeCvs);

    // Two particle colors: pink and purple
    const pColors = ['rgba(233,30,140,', 'rgba(156,39,176,', 'rgba(244,114,182,'];

    function spawnPt() {
      pts.push({
        x: Math.floor(Math.random() * (innerWidth / 4)) * 4,
        y: innerHeight + 4,
        size: [2, 4, 4, 6][Math.floor(Math.random() * 4)],
        speed: 0.3 + Math.random() * 0.5,
        opacity: 0.1 + Math.random() * 0.4,
        color: pColors[Math.floor(Math.random() * pColors.length)],
      });
    }

    function drawPts() {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      pts = pts.filter(p => p.y > -10);
      pts.forEach(p => {
        p.y -= p.speed;
        ctx.fillStyle = p.color + p.opacity + ')';
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
      requestAnimationFrame(drawPts);
    }
    drawPts();
    setInterval(spawnPt, 250);

    // ── GSAP intro ────────────────────────────────────────────────────────────
    gsap.registerPlugin(TextPlugin);

    gsap.timeline({ delay: 0.2 })
      .from('#header',  { opacity: 0, y: -24, duration: 0.5, ease: 'power2.out' })
      .from('#divider', { scaleX: 0, duration: 0.4, ease: 'power2.out' }, '-=0.2')
      .from('#card',    { opacity: 0, y: 24, duration: 0.5, ease: 'power2.out' }, '-=0.1')
      .from('.footer',  { opacity: 0, duration: 0.4 });

    // ── Equalizer GSAP ────────────────────────────────────────────────────────
    let eqTls = [];
    const eqIds = ['b1','b2','b3','b4','b5','b6','b7','b8'];
    const eqSeqs = [
      [3,16,6,20,8,14,3], [8,3,18,5,14,3,10],
      [14,20,5,16,3,18,8], [5,10,22,3,14,6,16],
      [20,5,14,3,18,6,20], [6,18,3,12,20,3,14],
      [11,3,18,6,14,3,11], [16,8,3,20,6,12,16],
    ];

    function startEQ() {
      stopEQ();
      eqIds.forEach((id, i) => {
        const el = document.getElementById(id);
        if (!el) return;
        const seq = eqSeqs[i % eqSeqs.length];
        const t = gsap.timeline({ repeat: -1 });
        seq.forEach(h => {
          t.to(el, { height: h, duration: 0.09 + Math.random() * 0.06, ease: 'none' });
        });
        t.timeScale(0.8 + Math.random() * 0.4);
        eqTls.push(t);
      });
    }

    function stopEQ() {
      eqTls.forEach(t => t.kill());
      eqTls = [];
      eqIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) gsap.to(el, { height: 3, duration: 0.3 });
      });
    }

    // ── Progress bar ──────────────────────────────────────────────────────────
    const BLOCKS = 36;
    const track = document.getElementById('prog-track');

    function initProg() {
      track.innerHTML = '';
      for (let i = 0; i < BLOCKS; i++) {
        const b = document.createElement('div');
        b.className = 'prog-px';
        b.id = 'pp' + i;
        track.appendChild(b);
      }
    }
    initProg();

    function setProg(pct) {
      const filled = Math.round(pct * BLOCKS);
      for (let i = 0; i < BLOCKS; i++) {
        const el = document.getElementById('pp' + i);
        if (!el) continue;
        const f = i < filled;
        el.classList.toggle('filled', f);
      }
    }

    function fmt(ms) {
      const s = Math.floor(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    // ── State & tick ──────────────────────────────────────────────────────────
    let progress = 0, duration = 0, isPlaying = false, ticker = null;

    function startTick() {
      stopTick();
      ticker = setInterval(() => {
        if (isPlaying) {
          progress = Math.min(progress + 1000, duration);
          setProg(duration > 0 ? progress / duration : 0);
          document.getElementById('t-cur').textContent = fmt(progress);
        }
      }, 1000);
    }

    function stopTick() { if (ticker) { clearInterval(ticker); ticker = null; } }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(data) {
      if (data.error === 'not_authenticated') {
        document.getElementById('auth-box').style.display = 'block';
        document.getElementById('embed-section').style.display = 'none';
        document.getElementById('led').className = 'led';
        document.getElementById('slabel').className = 'status-label';
        document.getElementById('slabel').textContent = 'NOT CONNECTED';
        stopEQ(); stopTick();
        return;
      }

      document.getElementById('auth-box').style.display = 'none';
      document.getElementById('embed-section').style.display = 'block';

      isPlaying = data.isPlaying;
      progress  = data.progress || 0;
      duration  = data.duration || 0;

      const card  = document.getElementById('card');
      const led   = document.getElementById('led');
      const label = document.getElementById('slabel');

      if (isPlaying) {
        card.classList.add('playing');
        led.className = 'led on';
        label.className = 'status-label on';
        label.textContent = 'NOW PLAYING';
        startEQ(); startTick();
      } else {
        card.classList.remove('playing');
        led.className = 'led';
        label.className = 'status-label';
        label.textContent = data.title ? 'PAUSED' : 'NOTHING PLAYING';
        stopEQ(); stopTick();
      }

      const titleEl  = document.getElementById('s-title');
      const artistEl = document.getElementById('s-artist');
      const newT = (data.title  || '---').toUpperCase();
      const newA = (data.artist || '---').toUpperCase();

      if (titleEl.textContent !== newT) {
        gsap.to(titleEl, { opacity: 0, duration: 0.12, onComplete: () => {
          titleEl.textContent = newT;
          gsap.to(titleEl, { opacity: 1, duration: 0.15 });
        }});
      }
      if (artistEl.textContent !== newA) {
        gsap.to(artistEl, { opacity: 0, duration: 0.12, onComplete: () => {
          artistEl.textContent = newA;
          gsap.to(artistEl, { opacity: 1, duration: 0.15 });
        }});
      }

      const img = document.getElementById('art-img');
      const ph  = document.getElementById('art-ph');
      if (data.albumArt) {
        if (img.src !== data.albumArt) {
          gsap.to(img, { opacity: 0, duration: 0.2, onComplete: () => {
            img.src = data.albumArt;
            img.style.display = 'block';
            ph.style.display  = 'none';
            gsap.to(img, { opacity: 1, duration: 0.25 });
          }});
        }
      } else {
        img.style.display = 'none';
        ph.style.display  = 'flex';
      }

      const link = document.getElementById('s-link');
      if (data.songUrl) { link.href = data.songUrl; link.style.display = 'inline-flex'; }
      else link.style.display = 'none';

      setProg(duration > 0 ? progress / duration : 0);
      document.getElementById('t-cur').textContent = fmt(progress);
      document.getElementById('t-dur').textContent = fmt(duration);

      const origin = window.location.origin;
      document.getElementById('embed-code').textContent =
        `[![Now Playing](${origin}/api/now-playing/svg)](${origin})`;
    }

    function copyEmbed(el) {
      navigator.clipboard.writeText(el.textContent).then(() => {
        gsap.fromTo(el, { borderColor: '#e91e8c' }, { borderColor: '#3d2a50', duration: 1 });
      });
    }

    // ── SSE ───────────────────────────────────────────────────────────────────
    function connect() {
      const es = new EventSource('/api/stream');
      es.onmessage = e => { try { render(JSON.parse(e.data)); } catch {} };
      es.onerror   = () => { es.close(); setTimeout(connect, 5000); };
    }
    connect();
  </script>
</body>
</html>
