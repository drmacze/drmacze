<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOW PLAYING // FIRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <style>
    :root {
      --black:   #000000;
      --bg:      #060100;
      --surf:    #120400;
      --surf2:   #1e0700;
      --fy:      #FFD700;
      --fo:      #FF6600;
      --fr:      #CC2200;
      --fd:      #771100;
      --fe:      #3a0800;
      --text:    #FFF0CC;
      --muted:   #CC7733;
      --dead:    #3a1800;
      --px:      4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Fire background canvas – CSS pixel art shows in screenshots;
          2-D canvas Doom fire overlays in real browsers               ── */
    #glc {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      /* CSS pixel grid seams (14 px cells, 1.5 px gap) */
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 12.5px,
          rgba(0,0,0,0.80) 12.5px, rgba(0,0,0,0.80) 14px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 12.5px,
          rgba(0,0,0,0.80) 12.5px, rgba(0,0,0,0.80) 14px
        ),
        /* fire gradient: yellow → orange → deep red → black */
        linear-gradient(
          0deg,
          #FFD700   0%,
          #FF6600  18%,
          #CC2200  38%,
          #771100  55%,
          #331100  70%,
          #0d0200  85%,
          #060100 100%
        );
      background-size: 14px 14px, 14px 14px, 100% 100%;
    }

    /* ── Scanlines ────────────────────────────────────────── */
    #scan {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none; z-index: 997;
    }

    /* ── Pixel grid bg overlay (now handled by #glc CSS) ─── */
    #pgrid { display: none; }

    /* ── Fire pixel bar (bottom) ──────────────────────────── */
    #firebar {
      position: fixed; bottom: 0; left: 0;
      width: 100%; z-index: 3;
      pointer-events: none; display: block;
    }

    /* ── Screen corner brackets ───────────────────────────── */
    .scr-corner {
      position: fixed; z-index: 10;
      width: 28px; height: 28px;
    }
    .scr-corner::before,
    .scr-corner::after {
      content: ''; position: absolute;
      background: var(--fo);
    }
    .scr-corner::before { width: 100%; height: 3px; top: 0; left: 0; }
    .scr-corner::after  { width: 3px; height: 100%; top: 0; left: 0; }
    .scr-corner.tl { top: 12px; left: 12px; }
    .scr-corner.tr { top: 12px; right: 12px; transform: rotate(90deg); }
    .scr-corner.bl { bottom: 12px; left: 12px; transform: rotate(270deg); }
    .scr-corner.br { bottom: 12px; right: 12px; transform: rotate(180deg); }

    /* ── Layout ───────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 80px 24px 200px;
    }
    /* dark radial vignette behind card — keeps text readable over fire bg */
    .page::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(
        ellipse 70% 65% at 50% 42%,
        rgba(6,1,0,0.78) 0%,
        rgba(6,1,0,0.45) 50%,
        transparent 100%
      );
      pointer-events: none; z-index: -1;
    }

    /* ── Header ───────────────────────────────────────────── */
    .hdr { display: flex; flex-direction: column; align-items: center; gap: 14px; }

    .hdr-label {
      font-size: 6px; letter-spacing: 5px;
      color: var(--muted); text-transform: uppercase;
    }

    .hdr-title-wrap {
      display: flex; align-items: center; gap: 8px;
    }

    .hdr-title {
      font-size: 16px; letter-spacing: 2px;
      background: linear-gradient(180deg, var(--fy) 0%, var(--fo) 50%, var(--fr) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(255,102,0,0.6));
    }

    #cursor-blink {
      display: inline-block; width: 12px; height: 18px;
      background: var(--fo); flex-shrink: 0;
    }

    .hdr-divider {
      width: 320px; height: 3px;
      background: linear-gradient(90deg,
        transparent, var(--fy), var(--fo), var(--fr), transparent);
    }

    /* ── Main card ────────────────────────────────────────── */
    .card { width: 100%; max-width: 540px; position: relative; }

    .card-inner {
      background: var(--surf);
      border: 3px solid var(--fo);
      padding: 20px; position: relative;
      box-shadow:
        6px 6px 0 var(--fd),
        0 0 50px rgba(255,102,0,0.12),
        inset 0 0 50px rgba(0,0,0,0.6);
    }

    /* pixel corner squares */
    .pxc {
      position: absolute; width: 8px; height: 8px;
    }
    .pxc.tl { top: -3px; left: -3px; background: var(--fy); }
    .pxc.tr { top: -3px; right: -3px; background: var(--fy); }
    .pxc.bl { bottom: -3px; left: -3px; background: var(--fy); }
    .pxc.br { bottom: -3px; right: -3px; background: var(--fy); }

    /* ── Card title bar ───────────────────────────────────── */
    .card-titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; margin: -20px -20px 16px;
      background: var(--surf2);
      border-bottom: 2px solid var(--fo);
    }

    .card-tb-left { display: flex; align-items: center; gap: 8px; }

    /* fire LED dot cluster */
    .fire-leds { display: flex; gap: 3px; }
    .fire-led-dot {
      width: 8px; height: 8px;
      background: var(--dead);
      border: 1px solid var(--fd);
    }
    .fire-leds.on .fire-led-dot:nth-child(1) {
      background: var(--fy);
      box-shadow: 0 0 8px var(--fy);
    }
    .fire-leds.on .fire-led-dot:nth-child(2) {
      background: var(--fo);
      box-shadow: 0 0 6px var(--fo);
    }
    .fire-leds.on .fire-led-dot:nth-child(3) {
      background: var(--fr);
      box-shadow: 0 0 4px var(--fr);
    }

    .status-label {
      font-size: 7px; letter-spacing: 2px;
      color: var(--dead);
    }
    .status-label.on { color: var(--fo); }

    /* EQ bars */
    .eq-wrap { display: flex; align-items: flex-end; gap: 3px; height: 22px; }
    .eq-bar {
      width: 6px; background: var(--fo);
      image-rendering: pixelated;
    }

    /* ── Card body ────────────────────────────────────────── */
    .card-body { display: flex; gap: 20px; align-items: flex-start; }

    /* ── Album art ────────────────────────────────────────── */
    .art-wrap { flex-shrink: 0; position: relative; }

    .art-frame {
      width: 108px; height: 108px;
      background: var(--surf2);
      border: 3px solid var(--fr);
      position: relative; overflow: hidden;
    }
    /* pixel grid overlay */
    .art-frame::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,102,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,102,0,0.06) 1px, transparent 1px);
      background-size: 6px 6px;
      z-index: 2; pointer-events: none;
    }
    /* fire shimmer */
    .art-frame::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(255,200,0,0.08) 0%, transparent 60%);
      z-index: 3; pointer-events: none;
    }

    .art-frame img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      image-rendering: auto;
    }

    .art-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 6px;
    }

    .art-pxc { position: absolute; z-index: 4; }
    .art-pxc.tl { top: -3px; left: -3px;   width: 6px; height: 6px; background: var(--fy); }
    .art-pxc.tr { top: -3px; right: -3px;  width: 6px; height: 6px; background: var(--fy); }
    .art-pxc.bl { bottom: -3px; left: -3px;  width: 6px; height: 6px; background: var(--fy); }
    .art-pxc.br { bottom: -3px; right: -3px; width: 6px; height: 6px; background: var(--fy); }

    /* ── Track info ───────────────────────────────────────── */
    .info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    .track-title {
      font-size: 10px; line-height: 1.8;
      color: var(--text); word-break: break-word;
    }
    .track-artist {
      font-size: 8px; color: var(--muted);
      letter-spacing: 1px; line-height: 1.6;
    }

    /* pixel art divider line */
    .px-divider {
      height: 2px;
      background: linear-gradient(90deg, var(--fo), var(--fr), transparent);
      width: 70%;
    }

    /* pixel art button */
    .px-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; letter-spacing: 1px;
      color: var(--fo); text-decoration: none;
      background: var(--fe);
      border: 2px solid var(--fo);
      padding: 7px 10px;
      box-shadow: 3px 3px 0 var(--fd);
      cursor: pointer;
      transition: none;
      margin-top: 4px;
    }
    .px-btn:hover {
      background: var(--fr);
      color: var(--fy);
      border-color: var(--fy);
      box-shadow: 4px 4px 0 var(--fd);
      transform: translate(-1px, -1px);
    }
    .px-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--fd);
    }

    /* ── Progress section ─────────────────────────────────── */
    .prog-section {
      margin-top: 18px; padding-top: 14px;
      border-top: 2px solid var(--fe);
    }

    .prog-track { display: flex; gap: 2px; margin-bottom: 8px; }

    .prog-px { height: 9px; flex: 1; background: var(--surf2); }
    .prog-px.lit {
      background: var(--fy);
      box-shadow: 0 0 4px rgba(255,215,0,0.6);
    }
    .prog-px.lit-mid { background: var(--fo); }
    .prog-px.lit-end { background: var(--fr); }

    .time-row {
      display: flex; justify-content: space-between;
      font-size: 7px; color: var(--dead);
    }

    /* ── Embed section ────────────────────────────────────── */
    .embed-section {
      width: 100%; max-width: 540px;
      background: var(--surf);
      border: 2px solid var(--fe);
      padding: 16px 20px;
      box-shadow: 4px 4px 0 var(--fd);
    }
    .embed-lbl {
      font-size: 6px; letter-spacing: 3px;
      color: var(--dead); display: block; margin-bottom: 10px;
    }
    .embed-code {
      background: var(--black);
      border: 1px solid var(--fe);
      padding: 10px 12px;
      font-size: 8px; color: var(--fo);
      font-family: 'Courier New', monospace;
      word-break: break-all; cursor: pointer;
      display: block;
      transition: border-color 0.15s;
    }
    .embed-code:hover { border-color: var(--fo); }
    .embed-hint { font-size: 6px; color: var(--dead); margin-top: 6px; text-align: right; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer { font-size: 6px; color: var(--dead); letter-spacing: 3px; }

    /* ── Fire bar height lock (JS canvas draws pixel blocks on top) ── */
    #firebar { height: 220px !important; }

    /* ── Pixel art "not connected" message ────────────────── */
    .not-cfg {
      width: 100%; max-width: 540px;
      background: var(--surf);
      border: 2px solid var(--fd);
      padding: 24px; text-align: center;
      box-shadow: 4px 4px 0 #330500;
      display: none;
    }
    .not-cfg h3 { font-size: 9px; color: var(--fo); margin-bottom: 12px; letter-spacing: 2px; }
    .not-cfg p  { font-size: 7px; color: var(--muted); line-height: 2.2; }
  </style>
</head>
<body>

        <div class="info">
          <div class="track-title" id="s-title">---</div>

          <div class="px-divider"></div>
          <a class="px-btn" id="s-link" href="#" target="_blank" style="display:none">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.624.624 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.624.624 0 0 1-.277-1.216c3.809-.87 7.076-.496 9.712 1.115a.624.624 0 0 1 .207.858zm1.223-2.723a.78.78 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.781.781 0 1 1-.454-1.491c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 0 1 .257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 1 1-.543-1.793c3.563-1.08 9.487-.871 13.22 1.37a.937.937 0 0 1-.96 1.578l-.1-.001z"/>
            </svg>
            OPEN LINK

      <!-- Progress -->
      <div class="prog-section">
        <div class="prog-track" id="prog-track"></div>

    </div>
  </div>

  <!-- Not configured box -->
  <div class="not-cfg" id="not-cfg">
    <h3>[ NOT CONFIGURED ]</h3>
    <p>Set LASTFM_API_KEY<br/>and LASTFM_USERNAME<br/>to enable the widget.</p>
  </div>

  <!-- Embed -->
  <div class="embed-section" id="embed-sec" style="display:none">
    <span class="embed-lbl">&gt; README EMBED CODE</span>
    <div class="embed-code" id="embed-code" onclick="copyEmbed(this)"></div>
    <div class="embed-hint">[ CLICK TO COPY ]</div>
  </div>

  <div class="footer">DRMACZE // FIRE MODULE // 2026</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// LENIS SMOOTH SCROLL
// ═══════════════════════════════════════════════════════════════
const lenis = new Lenis({
  duration: 1.2,
  easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
});
(function raf(t) { lenis.raf(t); requestAnimationFrame(raf); })(0);


// ═══════════════════════════════════════════════════════════════
// 2-D CANVAS  DOOM-STYLE PIXEL ART FIRE BACKGROUND
// ═══════════════════════════════════════════════════════════════
(function initFireBG() {
  const cvs = document.getElementById('glc');
  const ctx = cvs.getContext('2d');
  if (!ctx) { cvs.style.display = 'none'; return; }

  /* ── palette: index 0 = black, 9 = yellow ── */
  const PAL = [
    '#060100','#220300','#440700','#771100',
    '#991100','#CC2200','#FF4400','#FF6600',
    '#FF9900','#FFD700'
  ];
  const NPAL = PAL.length;   /* 10 */
  const CELL = 14;           /* px per grid cell */
  const GAP  = 1;            /* seam width */
  /* how many cols/rows of cells fill the viewport */
  const getW = () => Math.max(window.innerWidth  || 0,
    document.documentElement.clientWidth  || 0, screen.width  || 0, 320);
  const getH = () => Math.max(window.innerHeight || 0,
    document.documentElement.clientHeight || 0, screen.height || 0, 240);

  let COLS, ROWS, grid, nxtGrid;

  const init = () => {
    const W = getW(), H = getH();
    cvs.width  = W;
    cvs.height = H;
    COLS = Math.ceil(W / CELL) + 1;
    ROWS = Math.ceil(H / CELL) + 2;   /* extra rows below screen */
    grid    = new Uint8Array(COLS * ROWS);
    nxtGrid = new Uint8Array(COLS * ROWS);
    /* seed: bottom two rows are max heat */
    for (let c = 0; c < COLS; c++) {
      grid[(ROWS - 1) * COLS + c] = NPAL - 1;
      grid[(ROWS - 2) * COLS + c] = NPAL - 1;
    }
  };

  /* classic Doom fire propagation */
  const spread = () => {
    nxtGrid.set(grid);
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS; c++) {
        const below = grid[(r + 1) * COLS + c];
        /* random sideways drift ±1, decay 0-1 */
        const wind  = (Math.random() * 3 | 0) - 1;  /* -1, 0, or 1 */
        const decay = Math.random() < 0.55 ? 1 : 0;
        const nc    = Math.max(0, Math.min(COLS - 1, c + wind));
        nxtGrid[r * COLS + nc] = Math.max(0, below - decay);
      }
    }
    const tmp = grid; grid = nxtGrid; nxtGrid = tmp;
  };

  const draw = () => {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    /* draw cells */
    for (let r = 0; r < ROWS - 2; r++) {          /* skip the invisible bottom rows */
      /* y from top of canvas */
      const y   = r * CELL;
      /* screen fraction 0(top)→1(bottom) — used to dim upper cells */
      const yF  = r / (ROWS - 2);
      /* opacity: dim at top, full at bottom – keeps card readable */
      const opa = Math.min(1, 0.18 + 0.82 * yF * yF);
      for (let c = 0; c < COLS; c++) {
        const t = grid[r * COLS + c];
        if (t === 0) continue;                     /* skip black cells (transparent) */
        const x = c * CELL;
        ctx.globalAlpha = opa;
        ctx.fillStyle   = PAL[t];
        ctx.fillRect(x, y, CELL - GAP, CELL - GAP);
      }
    }
    ctx.globalAlpha = 1;
  };

  /* draw a first frame synchronously so it shows even before rAF */
  init();
  /* warm up: run 40 spread passes so fire reaches the top on load */
  for (let i = 0; i < 40; i++) spread();
  draw();

  window.addEventListener('resize', () => { init(); });

  let frame = 0;
  (function loop() {
    frame++;
    /* spread every 2nd frame to slow the rise slightly */
    if (frame % 2 === 0) spread();
    draw();
    requestAnimationFrame(loop);
  })();
})();


// ═══════════════════════════════════════════════════════════════
// PIXEL ART FIRE BAR (bottom) — matches reference image style
// ═══════════════════════════════════════════════════════════════
(function initFireBar() {
  const cvs = document.getElementById('firebar');
  const ctx = cvs.getContext('2d');

  const CELL   = 10;
  const ROWS   = 22;
  const GAP    = 1;
  cvs.height   = ROWS * CELL;

  // fire color palette: index 0 = bottom (yellow), last = top (dark)
  const PAL = [
    '#FFD700','#FFD200','#FFC400',  // yellow bottom
    '#FFA500','#FF8800','#FF6600',  // orange
    '#FF4400','#FF2200','#EE1100',  // red-orange
    '#CC1100','#AA0F00','#880D00',  // red
    '#660B00','#440700','#330500',  // dark red
    '#220300','#110100','#050000',  // near-black top
  ];

  let W, COLS;
  let heights  = [];
  let targets  = [];
  let vels     = [];
  let sparks   = []; // floating spark pixels

  let playing  = false;

  const getW = () => Math.max(
    window.innerWidth || 0,
    document.documentElement.clientWidth || 0,
    screen.width || 0,
    320
  );

  const resize = () => {
    W    = getW();
    COLS = Math.ceil(W / CELL);
    cvs.width = W;
    // pre-populate with visible idle flame heights
    while (heights.length < COLS) {
      heights.push(ROWS * (0.3 + Math.random() * 0.35));
      targets.push(ROWS * (0.4 + Math.random() * 0.4));
      vels.push(0);
    }
  };
  resize();
  // re-run after layout is fully computed
  window.addEventListener('load', resize);
  window.addEventListener('resize', resize);

  // spawn sparks
  function spawnSpark(x, y) {
    sparks.push({
      x, y,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -(0.4 + Math.random() * 0.8),
      life: 1.0,
      decay: 0.02 + Math.random() * 0.03,
    });
  }

  function update() {
    const baseMax = playing ? ROWS * 0.95 : ROWS * 0.55;

    for (let i = 0; i < COLS; i++) {
      // random target bursts
      if (Math.random() < (playing ? 0.08 : 0.03)) {
        targets[i] = baseMax * (0.4 + Math.random() * 0.6);
      }
      // spring + damping
      vels[i] += (targets[i] - heights[i]) * 0.12;
      vels[i] *= 0.72;
      heights[i] += vels[i];
      heights[i]  = Math.max(0, heights[i]);
      // decay
      targets[i] *= 0.94;

      // spawn sparks from tall columns
      if (playing && heights[i] > ROWS * 0.6 && Math.random() < 0.04) {
        spawnSpark(i * CELL + CELL / 2, cvs.height - heights[i] * CELL);
      }
    }

    // update sparks
    sparks = sparks.filter(s => s.life > 0);
    sparks.forEach(s => {
      s.x += s.vx; s.y += s.vy;
      s.life -= s.decay;
    });
  }

  function draw() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    // draw columns
    for (let i = 0; i < COLS; i++) {
      const h = Math.round(heights[i]);
      for (let j = 0; j < h && j < ROWS; j++) {
        // j=0 bottom (yellow), j=h-1 top (dark)
        // j=0 = bottom row (yellow), j=ROWS-1 = top (dark)
        const colorIdx = Math.min(Math.round((j / ROWS) * (PAL.length - 1)), PAL.length - 1);
        ctx.fillStyle = PAL[colorIdx];
        ctx.fillRect(
          i * CELL,
          cvs.height - (j + 1) * CELL,
          CELL - GAP,
          CELL - GAP
        );
      }
    }

    // draw sparks
    sparks.forEach(s => {
      const alpha = s.life;
      ctx.globalAlpha = alpha;
      // spark color based on life
      ctx.fillStyle = s.life > 0.5 ? '#FFD700' : s.life > 0.25 ? '#FF6600' : '#CC2200';
      ctx.fillRect(Math.round(s.x), Math.round(s.y), CELL - GAP, CELL - GAP);
    });
    ctx.globalAlpha = 1;
  }

  (function loop() {
    update(); draw();
    requestAnimationFrame(loop);
  })();

  window.setFirePlaying = v => { playing = v; };
})();

// ═══════════════════════════════════════════════════════════════
// EQUALIZER BARS
// ═══════════════════════════════════════════════════════════════
let eqTls  = [];
const EQ_IDS = ['b1','b2','b3','b4','b5','b6','b7','b8'];
const EQ_SEQ = [
  [3,16,7,20,9,14,3], [9,3,18,5,14,3,10],
  [14,20,5,16,3,18,8],[5,10,22,3,14,6,16],
  [20,5,14,3,18,6,20],[6,18,3,12,20,3,14],
  [11,3,16,6,12,3,11],[16,8,3,20,6,12,16],
];
// fire gradient colors for each bar (yellow→orange→red)
const EQ_COLORS = ['#FFD700','#FFC200','#FFA500','#FF7700','#FF4400','#FF2200','#CC1100','#AA0F00'];

function startEQ() {
  stopEQ();
  EQ_IDS.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.background = EQ_COLORS[i];
    const seq = EQ_SEQ[i];
    const tl  = gsap.timeline({ repeat: -1 });
    seq.forEach(h => tl.to(el, { height: h, duration: 0.08 + Math.random() * 0.05, ease: 'none' }));
    tl.timeScale(0.7 + Math.random() * 0.45);
    eqTls.push(tl);
  });
}
function stopEQ() {
  eqTls.forEach(t => t.kill()); eqTls = [];
  EQ_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.background = 'var(--fe)'; gsap.to(el, { height: 3, duration: 0.35 }); }
  });
}


// ═══════════════════════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════════════════════
const BLOCKS = 42;
const progTrack = document.getElementById('prog-track');

(function initProg() {
  for (let i = 0; i < BLOCKS; i++) {
    const b = document.createElement('div');
    b.className = 'prog-px'; b.id = 'pp' + i;
    progTrack.appendChild(b);
  }
})();

function setProg(pct) {
  const filled = Math.round(pct * BLOCKS);
  for (let i = 0; i < BLOCKS; i++) {
    const el = document.getElementById('pp' + i);
    if (!el) continue;
    el.classList.remove('lit','lit-mid','lit-end');
    if (i < filled) {
      const ratio = i / BLOCKS;
      if (ratio < 0.4) el.classList.add('lit');
      else if (ratio < 0.75) el.classList.add('lit-mid');
      else el.classList.add('lit-end');
    }
  }
}

function fmt(ms) {
  const s = Math.floor((ms || 0) / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}


// ═══════════════════════════════════════════════════════════════
// MUSIC STATE
// ═══════════════════════════════════════════════════════════════
let _progress = 0, _duration = 0, _playing = false, _ticker = null;

function startTick() {
  stopTick();
  _ticker = setInterval(() => {
    if (_playing && _duration > 0) {
      _progress = Math.min(_progress + 1000, _duration);
      setProg(_progress / _duration);
      document.getElementById('t-cur').textContent = fmt(_progress);
    }
  }, 1000);
}
function stopTick() { clearInterval(_ticker); _ticker = null; }

function applyTrack(data) {
  _playing  = !!data.isPlaying;
  _progress = data.progress || 0;
  _duration = data.duration || 0;

  /* status */
  const leds = document.getElementById('fire-leds');
  const lbl  = document.getElementById('slabel');
  leds.classList.toggle('on', _playing);
  lbl.classList.toggle('on', _playing || data.isTopTrack);
  lbl.textContent = _playing ? 'NOW PLAYING' :
    data.isTopTrack ? 'LAST PLAYED' : 'NOTHING PLAYING';

  /* fire + eq */
  if (window.setFirePlaying) window.setFirePlaying(_playing || !!data.isTopTrack);
  if (_playing || data.isTopTrack) startEQ(); else stopEQ();

  /* album art */
  const aImg = document.getElementById('art-img');
  const aPh  = document.getElementById('art-ph');
  if (data.albumArt) {
    aImg.src = data.albumArt; aImg.style.display = 'block';
    aPh.style.display = 'none';
  } else {
    aImg.style.display = 'none'; aPh.style.display = 'flex';
  }

  /* track info */
  document.getElementById('s-title').textContent  = (data.title  || '---').substring(0, 22);
  document.getElementById('s-artist').textContent = (data.artist || '---').substring(0, 28);

  const lnk = document.getElementById('s-link');
  if (data.songUrl) { lnk.href = data.songUrl; lnk.style.display = 'inline-flex'; }
  else { lnk.style.display = 'none'; }

  /* progress */
  setProg(_duration > 0 ? _progress / _duration : 0);
  document.getElementById('t-cur').textContent = fmt(_progress);
  document.getElementById('t-dur').textContent = fmt(_duration);

  if (_playing) startTick(); else stopTick();

  /* card glow */
  gsap.to('.card-inner', {
    boxShadow: _playing
      ? '6px 6px 0 var(--fd), 0 0 60px rgba(255,102,0,0.3), inset 0 0 50px rgba(0,0,0,0.6)'
      : '6px 6px 0 var(--fd), 0 0 50px rgba(255,102,0,0.08), inset 0 0 50px rgba(0,0,0,0.6)',
    duration: 1.0,
  });

  /* embed */
  const embSec  = document.getElementById('embed-sec');
  const embCode = document.getElementById('embed-code');
  if (embSec && embCode) {
    embSec.style.display = 'block';
    const url = window.location.origin;
    embCode.textContent = `[![Now Playing](${url}/api/now-playing/svg)](${url})`;
  }

  /* hide not-cfg if data received */
  document.getElementById('not-cfg').style.display = 'none';
  document.getElementById('main-card').style.display = 'block';
}

function handleError(data) {
  if (data.error === 'not_configured') {
    document.getElementById('not-cfg').style.display = 'block';
    document.getElementById('main-card').style.display = 'none';
  }
}


// ═══════════════════════════════════════════════════════════════
// SSE — live music stream
// ═══════════════════════════════════════════════════════════════
const es = new EventSource('/api/stream');
es.onmessage = e => {
  try {
    const d = JSON.parse(e.data);
    if (d.error) handleError(d);
    else applyTrack(d);
  } catch {}
};


// ═══════════════════════════════════════════════════════════════
// EMBED COPY
// ═══════════════════════════════════════════════════════════════
function copyEmbed(el) {
  navigator.clipboard?.writeText(el.textContent).then(() => {
    const orig = el.textContent;
    el.textContent = '[ COPIED! ]';
    setTimeout(() => el.textContent = orig, 1500);
  });
}
