name: Update Stats Badge

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Stats & Update Badge URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/users/drmacze")
          REPOS=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['public_repos'])")
          FOLLOWERS=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['followers'])")
          COMMITS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.cloak-preview+json" \
            "https://api.github.com/search/commits?q=author:drmacze&per_page=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_count',0))")
          echo "::notice::Repos=$REPOS | Followers=$FOLLOWERS | Commits=$COMMITS"

      - name: Update stats timestamp in README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          # Only update if the date line actually changed to avoid empty commits
          sed -i "s/<!-- stats-updated:.* -->/<!-- stats-updated: $DATE -->/" README.md || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh stats [${{ github.run_number }}]"
          commit_options: "--allow-empty"
          file_pattern: "README.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
